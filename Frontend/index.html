<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubuntu Skills</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#/login" aria-label="Ubuntu Skills home">
          <span class="brand-mark">US</span>
          <span>
            <strong>Ubuntu Skills</strong>
            <small>Peer skill exchange</small>
          </span>
        </a>

        <nav class="nav-links">
          <a href="#/dashboard" data-route="dashboard" data-auth="user">Dashboard</a>
          <a href="#/sessions" data-route="sessions" data-auth="user">Sessions</a>
          <a href="#/profile" data-route="profile" data-auth="user">Profile</a>
          <a href="#/login" data-route="login" data-auth="guest">Login</a>
          <a href="#/register" data-route="register" data-auth="guest">Register</a>
          <a href="#/login" id="logout-link" data-auth="user">Logout</a>
        </nav>

        <section class="match-panel" aria-label="Current match status">
          <div class="mini-avatars" aria-hidden="true">
            <img src="https://i.pravatar.cc/80?img=12" alt="" />
            <img src="https://i.pravatar.cc/80?img=32" alt="" />
            <img src="https://i.pravatar.cc/80?img=47" alt="" />
          </div>
          <p>Track session requests, approvals, and reviews from one place.</p>
        </section>
      </aside>

      <main class="page">
        <header class="topbar">
          <div>
            <p class="eyebrow">Community learning dashboard</p>
            <h1 id="page-title">Ubuntu Skills</h1>
          </div>
          <a class="top-action" href="#/dashboard" data-auth="user">View Dashboard</a>
          <a class="top-action" href="#/login" data-auth="guest">Sign In</a>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <template id="login-template">
      <div class="auth-layout">
        <section class="auth-copy">
          <div class="photo-strip" aria-hidden="true">
            <img src="https://picsum.photos/seed/ubuntuskills-login/900/500" alt="" />
          </div>
          <h2>Exchange skills with people who want to grow with you.</h2>
          <p>Sign in to request sessions, respond to session requests, and leave reviews once a session is complete.</p>
        </section>

        <form class="form-panel" id="login-form">
          <label>
            Email
            <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </label>
          <label>
            Password
            <input required name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div class="form-row">
            <label class="check-label">
              <input type="checkbox" />
              Remember me
            </label>
            <a href="#/register">Create account</a>
          </div>
          <button type="submit">Login</button>
          <div class="form-message error" id="loginError"></div>
        </form>
      </div>
    </template>

    <template id="register-template">
      <div class="split-layout">
        <section class="form-panel wide">
          <div class="section-heading">
            <p class="eyebrow">Create account</p>
            <h2>Tell Ubuntu Skills what you can teach and what you want to learn.</h2>
          </div>
          <div class="field-grid">
            <label>
              Full name
              <input name="name" type="text" placeholder="Amina Hassan" autocomplete="name" required />
            </label>
            <label>
              Email
              <input name="email" type="email" placeholder="amina@example.com" autocomplete="email" required />
            </label>

            <label>
              Password
              <input name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            </label>

            <label>
              Confirm password
              <input name="confirm_password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            </label>
            <label>
              Teach category ID
              <input name="teach_category_id" type="number" min="1" placeholder="e.g. 3" />
            </label>
            <label>
              What you'll teach
              <input name="teach_description" type="text" placeholder="Intro to web design" />
            </label>
            <label>
              Learn category ID
              <input name="learn_category_id" type="number" min="1" placeholder="e.g. 7" />
            </label>
            <label>
              What you want to learn
              <input name="learn_description" type="text" placeholder="Advanced JavaScript" />
            </label>
          </div>
          <label>
            Verification document (only required if your email isn't a school address)
            <input name="document" type="file" accept=".pdf,.png,.jpg,.jpeg" />
          </label>
          <button type="button" id="register-btn">Register</button>
          <div class="form-message error" id="registerMessage"></div>
        </section>

        <aside class="info-band">
          <h3>Matching flow</h3>
          <ol>
            <li>Create your profile.</li>
            <li>Get verified via school email or an uploaded document.</li>
            <li>Request and approve sessions from the Sessions page.</li>
          </ol>
        </aside>
      </div>
    </template>

    <template id="dashboard-template">
      <div class="dashboard-layout">
        <section class="dashboard-hero">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h2 id="dashboard-name">there</h2>
            <p>Here's a snapshot of your session activity and reputation.</p>
          </div>
        </section>

        <div class="form-message error" id="dashboard-error"></div>

        <section class="stats-grid">
          <article class="stat-card">
            <span class="stat-label">Pending sessions</span>
            <strong class="stat-value" id="stat-pending">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Upcoming sessions</span>
            <strong class="stat-value" id="stat-upcoming">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Completed sessions</span>
            <strong class="stat-value" id="stat-completed">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Average rating</span>
            <strong class="stat-value" id="stat-rating">–</strong>
          </article>
        </section>

        <section class="dashboard-columns">
          <div class="profile-section">
            <h3>Recent sessions</h3>
            <ul class="activity-list" id="dashboard-recent-sessions">
              <li class="empty">Loading...</li>
            </ul>
          </div>

          <div class="profile-section">
            <h3>Quick links</h3>
            <div class="quick-links">
              <a class="quick-link" href="#/sessions">Manage your sessions</a>
              <a class="quick-link" href="#/profile">View your reviews</a>
            </div>
          </div>
        </section>
      </div>
    </template>

    <template id="sessions-template">
      <div class="skills-layout">
        <section class="skills-intro">
          <p class="eyebrow">Sessions</p>
          <h2>Request, respond to, and complete skill exchange sessions.</h2>
          <p>Enter the listing ID a tutor shared with you to request a session with them.</p>
        </section>

        <form class="form-panel" id="request-session-form">
          <div class="field-grid">
            <label>
              Listing ID (user_skill_id)
              <input name="user_skill_id" type="number" min="1" placeholder="e.g. 12" required />
            </label>
            <label>
              Scheduled time
              <input name="scheduled_time" type="datetime-local" required />
            </label>
          </div>
          <button type="submit">Request session</button>
          <div class="form-message error" id="request-session-message"></div>
        </form>

        <div class="form-message error" id="sessions-error"></div>

        <div id="sessions-container">
          <p class="empty">Loading sessions...</p>
        </div>
      </div>
    </template>

    <template id="profile-template">
      <div class="profile-grid">
        <section class="profile-hero">
          <img class="avatar" src="https://i.pravatar.cc/240?img=5" alt="Profile portrait" />
          <div>
            <p class="eyebrow">Ubuntu Skills member</p>
            <h2></h2>
            <p class="profile-email"></p>
            <div class="tag-row">
              <span id="profile-rating-summary">Loading rating...</span>
            </div>
          </div>
        </section>

        <section class="profile-section">
          <h3>Reviews you've received</h3>
          <ul class="activity-list" id="profile-reviews-list">
            <li class="empty">Loading...</li>
          </ul>
        </section>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
