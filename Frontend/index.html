<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubuntu Skills</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#/login" aria-label="Ubuntu Skills home">
          <span class="brand-mark">US</span>
          <span>
            <strong>Ubuntu Skills</strong>
            <small>Peer skill exchange</small>
          </span>
        </a>

        <nav class="nav-links">
          <a href="#/login" data-route="login">
            Login
          </a>
          <a href="#/register" data-route="register">
            Register
          </a>
          <a href="#/profile" data-route="profile">
            Profile
          </a>
          <a href="#/portfolio" data-route="portfolio">
            Portfolio
          </a>
          <a href="#/availability" data-route="availability">
            Availability
          </a>
          <a href="#/booking" data-route="booking">
            Book a Tutor
          </a>
          <a href="#/chat" data-route="chat">
            Chat
          </a>
        </nav>

        <section class="match-panel" aria-label="Current match status">
          <div class="mini-avatars" aria-hidden="true">
            <img src="C:\Users\rusan\Downloads\good-faces-xmSWVeGEnJw-unsplash.jpg" alt="" />
            <img src="C:\Users\rusan\Downloads\prince-akachi-J1OScm_uHUQ-unsplash.jpg" alt="" />
            <img src="C:\Users\rusan\Downloads\leon-elldot-f6HbVnGtNnY-unsplash.jpg" alt="" />
          </div>
          <p>3 suggested partners are ready to review.</p>
        </section>
      </aside>

      <main class="page">
        <header class="topbar">
        <div>
            <p class="eyebrow">Community learning dashboard</p>
            <h1 id="page-title">Ubuntu Skills</h1>
          </div>
          <a class="top-action" href="#/profile">View Profile</a>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <template id="login-template">
      <div class="auth-layout">
        <section class="auth-copy">
          <div class="photo-strip" aria-hidden="true">
            <img src="C:\Users\rusan\Downloads\desola-lanre-ologun-IgUR1iX0mqM-unsplash.jpg" alt="" />
          </div>
          <h2>Exchange skills with people who want to grow with you.</h2>
          <p>Sign in to manage your teaching skills, learning goals, matches, and in-site conversations.</p>
        </section>

        <form class="form-panel">
          <label>
            Email
            <input type="email" placeholder="you@example.com" autocomplete="email" required/>
          </label>
          <label>
            Password
            <input required name= "password" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div class="form-row">
            <label class="check-label">
              <input type="checkbox" />
              Remember me
            </label>
            <a href="#/register">Create account</a>
          </div>
          <button type="submit">Login</button>
          <div class="loginError" id="loginError">Invalid email or password</div>
        </form>
      </div>
    </template>

    <template id="register-template">
      <div class="split-layout">
        <section class="form-panel wide">
          <div class="section-heading">
            <p class="eyebrow">Create account</p>
            <h2>Tell Ubuntu Skills what you can teach and what you want to learn.</h2>
          </div>
          <div class="field-grid">
            <label>
              Full name
              <input name = "name" type="text" placeholder="Amina Hassan" autocomplete="name" />
            </label>
            <label>
              Email
              <input name="email" type="email" placeholder="amina@example.com" autocomplete="email" />
            </label>

            <label>
              Password
              <input name="password" type="password" placeholder="••••••••" autocomplete="new-password" />
            </label>

            <label>
              Password
              <input type="password" placeholder="••••••••" />
            </label>
            <label>
              Skill you can teach
              <input name="teach_skill" type="text" placeholder="Web design, Arabic, Excel..." />
            </label>
            <label>
              Skill you want to learn
              <input name = "learn_skill" type="text" placeholder="React, public speaking..." />
            </label>
          </div>
          <label>
            Short bio
            <textarea name = "bio" placeholder="Share your background, availability, and preferred learning style."></textarea>
          </label>
          <button type="button" id="register-btn">Register</button>
        </section>

        <aside class="info-band">
          <h3>Matching flow</h3>
          <ol>
            <li>Create your profile.</li>
            <li>Add teach and learn skills.</li>
            <li>Review automatic matches.</li>
          </ol>
        </aside>
      </div>
    </template>

    <template id="profile-template">
      <div class="profile-grid">
        <section class="profile-hero">
          <img class="avatar" src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?auto=format&fit=crop&w=240&q=80" alt="Profile portrait" />
          <div>
            <p class="eyebrow">Active learner and mentor</p>
            <h2></h2>
            <p>Front-end designer teaching UI fundamentals and learning advanced JavaScript through weekly peer sessions.</p>
            <div class="tag-row">
              <span>Teaches UI Design</span>
              <span>Learns JavaScript</span>
              <span>Kigali</span>
            </div>
          </div>
        </section>

        <section class="profile-section">
          <h3>Skills I Can Teach</h3>
          <div class="skill-list">
            <span>Wireframing</span>
            <span>HTML & CSS</span>
            <span>Portfolio reviews</span>
            <span>Design critique</span>
          </div>
        </section>

        <section class="profile-section">
          <h3>Skills I Want To Learn</h3>
          <div class="skill-list learn">
            <span>React basics</span>
            <span>JavaScript patterns</span>
            <span>API integration</span>
            <span>Technical interviews</span>
          </div>
        </section>

        <section class="conversation-panel">
          <h3>Matched Partner</h3>
          <div class="partner">
            <img src="C:\Users\rusan\Downloads\Jay.jpeg" alt="Matched partner portrait" />
            <div>
              <strong>Omar Khaled</strong>
              <p>Can teach JavaScript. Wants help with portfolio design.</p>
            </div>
          </div>
          <div class="message-box">
            <p><strong>Omar:</strong> I can review React components this weekend.</p>
            <input type="text" placeholder="Write a message..." />
          </div>
        </section>
      </div>
    </template>

    <template id="portfolio-template">
      <div class="portfolio-layout">
        <section class="portfolio-intro">
          <p class="eyebrow">Public portfolio</p>
          <h2>Show what you can teach.</h2>
          <p>Use this page to highlight examples, completed exchanges, certificates, and learning goals that help partners understand your strengths.</p>
        </section>

        <section class="project-grid">
          <article class="project-card">
            <img src="C:\Users\rusan\Downloads\ben-kolde-bs2Ba7t69mM-unsplash.jpg" alt="Laptop showing a design project" />
            <div>
              <h3>Landing Page Redesign</h3>
              <p>Guided a peer through layout, hierarchy, and responsive CSS for a student organization website.</p>
            </div>
          </article>
          <article class="project-card">
            <img src="C:\Users\rusan\Downloads\gaining-visuals-8X5_nh8R3Vk-unsplash.jpg" alt="Online learning workspace" />
            <div>
              <h3>HTML & CSS Workshop</h3>
              <p>Prepared a two-session mini course with exercises, references, and portfolio-ready tasks.</p>
            </div>
          </article>
          <article class="project-card">
            <img src="C:\Users\rusan\Downloads\christina-wocintechchat-com-m-UcZcsHSp8o4-unsplash.jpg" alt="People discussing work around a table" />
            <div>
              <h3>Peer Review Sessions</h3>
              <p>Completed five portfolio feedback sessions with matched learners inside Ubuntu Skills.</p>
            </div>
          </article>
        </section>
      </div>
    </template>

    <template id="availability-template">
      <div class="dashboard-layout">
        <section class="form-panel wide">
          <div class="section-heading">
            <p class="eyebrow">Tutor schedule</p>
            <h2>Add available time slots.</h2>
            <p>Choose a date and time learners can book for a peer learning session.</p>
          </div>

          <div class="field-grid">
            <label>
              Session date
              <input id="slot-date" type="date" />
            </label>
            <label>
              Start time
              <input id="slot-time" type="time" />
            </label>
            <label>
              Skill focus
              <input id="slot-skill" type="text" placeholder="React basics, UI review..." />
            </label>
            <label>
              Session length
              <input id="slot-length" type="text" placeholder="45 minutes" />
            </label>
          </div>

          <button id="add-slot" type="button">Add Time Slot</button>
          <p id="availability-confirmation" class="confirmation" role="status"></p>
        </section>

        <section class="list-panel">
          <div class="section-heading">
            <p class="eyebrow">Open slots</p>
            <h3>Your learner-facing availability</h3>
          </div>
          <div id="tutor-slots" class="slot-list"></div>
        </section>
      </div>
    </template>

    <template id="booking-template">
      <div class="dashboard-layout">
        <section class="tutor-summary">
          <img class="avatar" src="https://images.unsplash.com/photo-1506277886164-e25aa3f4ef7f?auto=format&fit=crop&w=240&q=80" alt="Tutor portrait" />
          <div>
            <p class="eyebrow">Available tutor</p>
            <h2>Omar Khaled</h2>
            <p>JavaScript mentor helping learners move from HTML and CSS into interactive front-end projects.</p>
            <div class="tag-row">
              <span>JavaScript</span>
              <span>React basics</span>
              <span>Portfolio support</span>
            </div>
          </div>
        </section>

        <section class="list-panel">
          <div class="section-heading">
            <p class="eyebrow">Learner booking</p>
            <h3>Open time slots</h3>
          </div>
          <div id="booking-slots" class="slot-list"></div>
          <p id="booking-confirmation" class="confirmation" role="status"></p>
        </section>
      </div>
    </template>

    <template id="chat-template">
      <div class="chat-layout">
        <section class="chat-header">
          <div class="partner">
            <img src="https://images.unsplash.com/photo-1506277886164-e25aa3f4ef7f?auto=format&fit=crop&w=120&q=80" alt="Chat partner portrait" />
            <div>
              <strong>Omar Khaled</strong>
              <p>Matched for JavaScript and portfolio design exchange</p>
            </div>
          </div>
          <a class="top-action" href="#/booking">Book Session</a>
        </section>
         <section id="chat-messages" class="chat-messages" aria-label="Conversation messages"></section>

        <form id="chat-form" class="chat-compose">
          <input id="chat-input" type="text" placeholder="Write a message..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
