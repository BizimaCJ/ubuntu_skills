<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ubuntu Skills</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#/login" aria-label="Ubuntu Skills home">
          <span class="brand-mark">US</span>
          <span>
            <strong>Ubuntu Skills</strong>
            <small>Peer skill exchange</small>
          </span>
        </a>

        <nav class="nav-links">
          <a href="#/dashboard" data-route="dashboard" data-auth="user">Dashboard</a>
          <a href="#/skills" data-route="skills">Skills</a>
          <a href="#/profile" data-route="profile" data-auth="user">Profile</a>
          <a href="#/portfolio" data-route="portfolio" data-auth="user">Portfolio</a>
          <a href="#/login" data-route="login" data-auth="guest">Login</a>
          <a href="#/register" data-route="register" data-auth="guest">Register</a>
          <a href="#/login" id="logout-link" data-auth="user">Logout</a>
        </nav>

        <section class="match-panel" aria-label="Current match status">
          <div class="mini-avatars" aria-hidden="true">
            <img src="https://i.pravatar.cc/80?img=12" alt="" />
            <img src="https://i.pravatar.cc/80?img=32" alt="" />
            <img src="https://i.pravatar.cc/80?img=47" alt="" />
          </div>
          <p>3 suggested partners are ready to review.</p>
        </section>
      </aside>

      <main class="page">
        <header class="topbar">
          <div>
            <p class="eyebrow">Community learning dashboard</p>
            <h1 id="page-title">Ubuntu Skills</h1>
          </div>
          <a class="top-action" href="#/dashboard" data-auth="user">View Dashboard</a>
          <a class="top-action" href="#/login" data-auth="guest">Sign In</a>
        </header>

        <section id="view" class="view" aria-live="polite"></section>
      </main>
    </div>

    <template id="login-template">
      <div class="auth-layout">
        <section class="auth-copy">
          <div class="photo-strip" aria-hidden="true">
            <img src="https://picsum.photos/seed/ubuntuskills-login/900/500" alt="" />
          </div>
          <h2>Exchange skills with people who want to grow with you.</h2>
          <p>Sign in to manage your teaching skills, learning goals, matches, and in-site conversations.</p>
        </section>

        <form class="form-panel" id="login-form">
          <label>
            Email
            <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </label>
          <label>
            Password
            <input required name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div class="form-row">
            <label class="check-label">
              <input type="checkbox" />
              Remember me
            </label>
            <a href="#/register">Create account</a>
          </div>
          <button type="submit">Login</button>
          <div class="form-message error" id="loginError"></div>
        </form>
      </div>
    </template>

    <template id="register-template">
      <div class="split-layout">
        <section class="form-panel wide">
          <div class="section-heading">
            <p class="eyebrow">Create account</p>
            <h2>Tell Ubuntu Skills what you can teach and what you want to learn.</h2>
          </div>
          <div class="field-grid">
            <label>
              Full name
              <input name="name" type="text" placeholder="Amina Hassan" autocomplete="name" required />
            </label>
            <label>
              Email
              <input name="email" type="email" placeholder="amina@example.com" autocomplete="email" required />
            </label>

            <label>
              Password
              <input name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            </label>

            <label>
              Confirm password
              <input name="confirm_password" type="password" placeholder="••••••••" autocomplete="new-password" required />
            </label>
            <label>
              Skill you can teach
              <input name="teach_skill" type="text" placeholder="Web design, Arabic, Excel..." />
            </label>
            <label>
              Skill you want to learn
              <input name="learn_skill" type="text" placeholder="React, public speaking..." />
            </label>
          </div>
          <label>
            Short bio
            <textarea name="bio" placeholder="Share your background, availability, and preferred learning style."></textarea>
          </label>
          <button type="button" id="register-btn">Register</button>
          <div class="form-message error" id="registerMessage"></div>
        </section>

        <aside class="info-band">
          <h3>Matching flow</h3>
          <ol>
            <li>Create your profile.</li>
            <li>Add teach and learn skills.</li>
            <li>Review automatic matches.</li>
          </ol>
        </aside>
      </div>
    </template>

    <template id="dashboard-template">
      <div class="dashboard-layout">
        <section class="dashboard-hero">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h2 id="dashboard-name">there</h2>
            <p>Here's a snapshot of your teaching, learning, and exchange activity.</p>
          </div>
        </section>

        <div class="form-message error" id="dashboard-error"></div>

        <section class="stats-grid">
          <article class="stat-card">
            <span class="stat-label">Skills teaching</span>
            <strong class="stat-value" id="stat-teach">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Skills learning</span>
            <strong class="stat-value" id="stat-learn">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Completed projects</span>
            <strong class="stat-value" id="stat-projects">–</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Verifications submitted</span>
            <strong class="stat-value" id="stat-verifications">–</strong>
          </article>
        </section>

        <section class="dashboard-columns">
          <div class="profile-section">
            <h3>Recent exchanges</h3>
            <ul class="activity-list" id="dashboard-recent-projects">
              <li class="empty">Loading...</li>
            </ul>
          </div>

          <div class="profile-section">
            <h3>Quick links</h3>
            <div class="quick-links">
              <a class="quick-link" href="#/skills">Browse the skill catalog</a>
              <a class="quick-link" href="#/profile">Update your profile</a>
              <a class="quick-link" href="#/portfolio">Manage your portfolio</a>
            </div>
          </div>
        </section>
      </div>
    </template>

    <template id="skills-template">
      <div class="skills-layout">
        <section class="skills-intro">
          <p class="eyebrow">Skill catalog</p>
          <h2>Find something to learn, or offer something to teach.</h2>
          <p>Search the full Ubuntu Skills catalog and see who's available to tutor each skill.</p>
          <input type="search" id="skills-search" class="skills-search" placeholder="Search skills or categories..." />
        </section>

        <div class="form-message error" id="skills-error"></div>

        <section class="skills-grid" id="skills-grid">
          <p class="empty">Loading skills...</p>
        </section>
      </div>
    </template>

    <template id="profile-template">
      <div class="profile-grid">
        <section class="profile-hero">
          <img class="avatar" src="https://i.pravatar.cc/240?img=5" alt="Profile portrait" />
          <div>
            <p class="eyebrow">Active learner and mentor</p>
            <h2></h2>
            <p>Front-end designer teaching UI fundamentals and learning advanced JavaScript through weekly peer sessions.</p>
            <div class="tag-row">
              <span>Teaches UI Design</span>
              <span>Learns JavaScript</span>
              <span>Kigali</span>
            </div>
          </div>
        </section>

        <section class="profile-section">
          <h3>Skills I Can Teach</h3>
          <div class="skill-list">
            <span class="empty">No teaching skills yet.</span>
          </div>
        </section>

        <section class="profile-section">
          <h3>Skills I Want To Learn</h3>
          <div class="skill-list learn">
            <span class="empty">No learning skills yet.</span>
          </div>
        </section>

        <section class="conversation-panel">
          <h3>Matched Partner</h3>
          <div class="partner">
            <img src="https://i.pravatar.cc/120?img=33" alt="Matched partner portrait" />
            <div>
              <strong>Omar Khaled</strong>
              <p>Can teach JavaScript. Wants help with portfolio design.</p>
            </div>
          </div>
          <div class="message-box">
            <p><strong>Omar:</strong> I can review React components this weekend.</p>
            <input type="text" placeholder="Write a message..." />
          </div>
        </section>
      </div>
    </template>

    <template id="portfolio-template">
      <div class="portfolio-layout">
        <section class="portfolio-intro">
          <p class="eyebrow">Public portfolio</p>
          <h2>Show what you can teach.</h2>
          <p>Use this page to highlight examples, completed exchanges, certificates, and learning goals that help partners understand your strengths.</p>
        </section>

        <section class="project-grid">
          <article class="project-card">
            <img src="https://picsum.photos/seed/ubuntuskills-1/600/400" alt="Laptop showing a design project" />
            <div>
              <h3>Landing Page Redesign</h3>
              <p>Guided a peer through layout, hierarchy, and responsive CSS for a student organization website.</p>
            </div>
          </article>
          <article class="project-card">
            <img src="https://picsum.photos/seed/ubuntuskills-2/600/400" alt="Online learning workspace" />
            <div>
              <h3>HTML & CSS Workshop</h3>
              <p>Prepared a two-session mini course with exercises, references, and portfolio-ready tasks.</p>
            </div>
          </article>
          <article class="project-card">
            <img src="https://picsum.photos/seed/ubuntuskills-3/600/400" alt="People discussing work around a table" />
            <div>
              <h3>Peer Review Sessions</h3>
              <p>Completed five portfolio feedback sessions with matched learners inside Ubuntu Skills.</p>
            </div>
          </article>
        </section>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
